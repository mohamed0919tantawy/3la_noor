<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>إنشاء حساب — {{ settings.site_name }}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: linear-gradient(135deg, #1a3a2e 0%, #0f2419 50%, #1a4a3a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .card { background: #fff; border-radius: 18px; padding: 36px 32px; width: 420px; max-width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.35); }
  .logo-wrap { text-align: center; margin-bottom: 14px; }
  .logo-img { max-width: 90px; max-height: 90px; border-radius: 12px; }
  .logo-fallback { font-size: 40px; }
  h1 { text-align: center; color: #1a3a2e; font-size: 20px; margin-bottom: 6px; font-weight: 700; }
  .subtitle { text-align: center; color: #777; font-size: 13px; margin-bottom: 24px; }
  label { display: block; font-size: 13px; color: #333; margin-bottom: 5px; font-weight: 600; }
  input { width: 100%; padding: 11px 13px; border: 2px solid #e0e0e0; border-radius: 9px; font-size: 14px; margin-bottom: 14px; }
  input[name=username], input[name=password], input[name=password2] { direction: ltr; }
  input:focus { outline: none; border-color: #1a6e4a; }
  .section-title { font-size: 12px; color: #1a6e4a; font-weight: 700; margin: 4px 0 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .divider { height: 1px; background: #f0f0f0; margin: 16px 0; }
  .btn { width: 100%; padding: 13px; background: #1a6e4a; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-top: 6px; }
  .btn:hover { background: #228a5c; }
  .flash { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
  .flash.error   { background: #fde8e8; color: #c0392b; }
  .flash.success { background: #e8f8e8; color: #1e8449; }
  .back-link { text-align: center; margin-top: 18px; }
  .back-link a { color: #888; font-size: 13px; text-decoration: none; }
  .back-link a:hover { color: #1a6e4a; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    {% if settings.logo_data %}
      <img src="{{ settings.logo_data }}" class="logo-img" alt="logo">
    {% else %}
      <span class="logo-fallback">🌙</span>
    {% endif %}
  </div>
  <h1>{{ settings.site_name }}</h1>
  <p class="subtitle">إنشاء حساب ولي أمر جديد</p>

  {% for msg in get_flashed_messages(with_categories=True) %}
    <div class="flash {{ msg[0] }}">{{ msg[1] }}</div>
  {% endfor %}

  <form method="POST">
    <div class="section-title">بياناتك</div>
    <label>اسمك (ولي الأمر)</label>
    <input type="text" name="parent_name" placeholder="مثال: أحمد محمد" required>
    <label>رقم التليفون</label>
    <input type="tel" name="phone" placeholder="01xxxxxxxxx" required>

    <div class="divider"></div>

    <div class="section-title">بيانات ابنك</div>
    <label>اسم الابن</label>
    <input type="text" name="child_name" placeholder="مثال: محمد أحمد" required>

    <div class="divider"></div>

    <div class="section-title">بيانات الدخول</div>
    <label>اسم المستخدم (هتسجل دخول بيه)</label>
    <input type="text" name="username" placeholder="username" required autocomplete="username">
    <label>كلمة السر</label>
    <input type="password" name="password" placeholder="••••••••" required minlength="4">
    <label>تأكيد كلمة السر</label>
    <input type="password" name="password2" placeholder="••••••••" required minlength="4">

    <button type="submit" class="btn">✅ إنشاء الحساب</button>
  </form>

  <div class="back-link">
    <a href="{{ url_for('login') }}">← عندي حساب بالفعل، تسجيل الدخول</a>
  </div>
</div>
</body>
</html>
