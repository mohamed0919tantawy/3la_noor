<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ settings.site_name }}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: linear-gradient(135deg, #1a3a2e 0%, #0f2419 50%, #1a4a3a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .card { background: #fff; border-radius: 18px; padding: 36px 32px; width: 380px; max-width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.35); }
  .logo-wrap { text-align: center; margin-bottom: 14px; }
  .logo-img { max-width: 110px; max-height: 110px; border-radius: 14px; }
  .logo-fallback { font-size: 48px; }
  h1 { text-align: center; color: #1a3a2e; font-size: 21px; margin-bottom: 6px; font-weight: 700; }
  .subtitle { text-align: center; color: #777; font-size: 13px; margin-bottom: 26px; }
  label { display: block; font-size: 14px; color: #333; margin-bottom: 6px; font-weight: 600; }
  input { width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 15px; margin-bottom: 16px; transition: border-color 0.2s; direction: ltr; }
  input:focus { outline: none; border-color: #1a6e4a; }
  .btn { width: 100%; padding: 13px; background: #1a6e4a; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
  .btn:hover { background: #228a5c; }
  .flash { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
  .flash.error   { background: #fde8e8; color: #c0392b; }
  .flash.success { background: #e8f8e8; color: #1e8449; }
  .register-link { text-align: center; margin-top: 20px; padding-top: 18px; border-top: 1px solid #f0f0f0; }
  .register-link p { color: #888; font-size: 13px; margin-bottom: 10px; }
  .btn-secondary { display: inline-block; padding: 10px 22px; background: #f0f4f1; color: #1a6e4a; border: 2px solid #1a6e4a; border-radius: 10px; font-size: 14px; font-weight: 700; text-decoration: none; transition: all 0.2s; }
  .btn-secondary:hover { background: #1a6e4a; color: #fff; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    {% if settings.logo_data %}
      <img src="{{ settings.logo_data }}" class="logo-img" alt="logo">
    {% else %}
      <span class="logo-fallback">🌙</span>
    {% endif %}
  </div>
  <h1>{{ settings.site_name }}</h1>
  <p class="subtitle">تسجيل الدخول لمتابعة الأوراد</p>

  {% for msg in get_flashed_messages(with_categories=True) %}
    <div class="flash {{ msg[0] }}">{{ msg[1] }}</div>
  {% endfor %}

  <form method="POST">
    <label>اسم المستخدم</label>
    <input type="text" name="username" placeholder="username" required autocomplete="username">
    <label>كلمة السر</label>
    <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
    <button type="submit" class="btn">🔑 دخول</button>
  </form>

  <div class="register-link">
    <p>لسه معندكش حساب؟ سجّل عشان تتابع ابنك</p>
    <a href="{{ url_for('register') }}" class="btn-secondary">➕ إنشاء حساب جديد</a>
  </div>
</div>
</body>
</html>
